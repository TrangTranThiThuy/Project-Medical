services:
  mongo:
    image: mongo:latest
    restart: always
    container_name: mongo_db
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: DBMedical
    volumes:
      - mongo_data:/data/db
      - ./init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  migration:
    build: .
    container_name: migration_script
    depends_on:
      mongo:
        condition: service_healthy
    environment:
        - MONGO_URI=${MONGO_URI}
        - MONGO_DB=DBMedical
    volumes:
      - ./data:/app/data
    command: >
      uv run python migrate_csv_to_mongo.py
      --csv data/healthcare_dataset.csv
      --collection Healthcare
      --db DBMedical
      --drop
    restart: "no"

volumes:
  mongo_data:

networks:
  default:
    name: medical_network
